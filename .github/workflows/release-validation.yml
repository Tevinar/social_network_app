name: Release Validation

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # Fetch the repository code for the workflow run.
      - name: Checkout
        uses: actions/checkout@v5

      # Install the Flutter SDK on the runner.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6

      # Download Dart and Flutter package dependencies.
      - name: Install dependencies
        run: flutter pub get

      # Build the Android release bundle (.aab).
      - name: Build Android App Bundle
        run: flutter build appbundle --release

  build-ios:
    runs-on: macos-latest

    steps:
      # Fetch the repository code for the workflow run.
      - name: Checkout
        uses: actions/checkout@v5

      # Install the Flutter SDK on the runner.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6

      # Download Dart and Flutter package dependencies.
      - name: Install dependencies
        run: flutter pub get

      # Install CocoaPods dependencies for the iOS project.
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      # Build the iOS release without code signing.
      - name: Build iOS release
        run: flutter build ipa --release --no-codesign